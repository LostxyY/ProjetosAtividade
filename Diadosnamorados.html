<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quer namorar comigo?</title>
    <style>
        body {
            background-color: #ff4d4d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Evita scroll se o botão fugir para longe */
        }

        .painel {
            background-color: white;
            width: 90%;
            max-width: 450px;
            height: 500px;
            border-radius: 20px;
            text-align: center;
            padding: 20px;
            font-family: 'Arial', sans-serif;
            position: relative;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
        }

        .botoes {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        #sim, #nao {
            height: 50px;
            width: 90px;
            background-color: #e60000;
            border: 2px solid white;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        /* O botão NÃO precisa de transição suave para parecer que está correndo */
        #nao {
            position: absolute; 
            /* Posição inicial ajustada via JS no carregamento ou inline */
            bottom: 50px;
            right: 100px;
        }

        #sim {
            position: relative;
            z-index: 1;
        }

        img {
            max-width: 180px;
            border-radius: 15px;
            margin: 20px 0;
        }

        h1 { color: #d63384; font-size: 24px; }
        h2 { color: #333; font-size: 20px; }
        
        a { text-decoration: none; }
    </style>
</head>
<body>

<div class="painel">
    <h1>Feliz Dia dos Namorados!</h1>
    <img src="https://media3.giphy.com/media/v1.Y2lkPTZjMDliOTUyN25pcmliNXEwcWk4YzBhaWF3ZnVtMDFsYnI2eG1id3Z6YXcxejFlbSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/U2SzxTpb3YiYigwIs7/200.gif" alt="Ursinhos">
    <h2>Quer namorar comigo?</h2>

    <div class="botoes">
        <a href="https://youtu.be/BkpqU3gdjlw" target="_blank">
            <button id="sim">Sim</button>
        </a>
        <button id="nao">Não</button>
    </div>
</div>

<script>
    const botaoNao = document.getElementById("nao");
    const painel = document.querySelector(".painel");

    function moverBotao(event) {
        // Evita comportamentos padrão do navegador (como zoom ou abrir menu de contexto)
        if (event) event.preventDefault();

        // Calcula a área útil do painel para o botão não sair dele
        const larguraPainel = painel.clientWidth;
        const alturaPainel = painel.clientHeight;

        // Dimensões do próprio botão
        const larguraBotao = botaoNao.offsetWidth;
        const alturaBotao = botaoNao.offsetHeight;

        // Gera posições aleatórias, mas desconta o tamanho do botão para ele não "vazar"
        const maxX = larguraPainel - larguraBotao;
        const maxY = alturaPainel - alturaBotao;

        const randomX = Math.floor(Math.random() * maxX);
        const randomY = Math.floor(Math.random() * maxY);

        // Aplica as novas coordenadas
        botaoNao.style.left = randomX + "px";
        botaoNao.style.top = randomY + "px";
    }

    // Foge quando o mouse chega perto (Computador)
    botaoNao.addEventListener("mouseover", moverBotao);

    // Foge quando alguém tenta clicar (Computador ou Celular)
    botaoNao.addEventListener("click", moverBotao);

    // Foge instantaneamente ao toque (Celular)
    botaoNao.addEventListener("touchstart", function(e) {
        e.preventDefault(); // Impede que o clique "real" aconteça após o toque
        moverBotao();
    });
</script>

</body>
</html>
