<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quer namorar comigo?</title>
    <style>
        body {
            background-color: #ff4d4d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Evita scroll se o botão fugir para longe */
        }

        .painel {
            background-color: white;
            width: 90%;
            max-width: 450px;
            height: 500px;
            border-radius: 20px;
            text-align: center;
            padding: 20px;
            font-family: 'Arial', sans-serif;
            position: relative;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
        }

        .botoes {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        #sim, #nao {
            height: 50px;
            width: 90px;
            background-color: #e60000;
            border: 2px solid white;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        /* O botão NÃO precisa de transição suave para parecer que está correndo */
        #nao {
            position: absolute; 
            /* Posição inicial ajustada via JS no carregamento ou inline */
            bottom: 50px;
            right: 100px;
        }

        #sim {
            position: relative;
            z-index: 1;
        }

        img {
            max-width: 180px;
            border-radius: 15px;
            margin: 20px 0;
        }

        h1 { color: #d63384; font-size: 24px; }
        h2 { color: #333; font-size: 20px; }
        
        a { text-decoration: none; }
    </style>
</head>
